name: New issue PII reminder

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Post reminder comment
        uses: actions/github-script@v9
        with:
          script: |
            const body = [
              "Thanks for opening an issue.",
              "",
              "A quick reminder: if your report accidentally included real personal data (names, emails, account identifiers, or anything sensitive), you can edit or delete the issue at any time, or ask a maintainer to scrub it for you. We would much rather help you remove something than leave it visible.",
              "",
              "A maintainer will take a look soon.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
