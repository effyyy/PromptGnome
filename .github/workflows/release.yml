name: Release

on:
  push:
    tags: ['v*']

jobs:
  guards:
    name: Free-build guards (Plan C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/free-build-guards.sh

  release:
    name: Production build + signed CRX + GitHub Release
    needs: guards
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Write CRX signing key
        env:
          CRX_SIGNING_KEY: ${{ secrets.CRX_SIGNING_KEY }}
        run: |
          if [ -z "$CRX_SIGNING_KEY" ]; then
            echo "::error::CRX_SIGNING_KEY secret is not set"
            exit 1
          fi
          printf '%s' "$CRX_SIGNING_KEY" > "$RUNNER_TEMP/promptgnome.pem"

      - name: Pack signed CRX
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx --yes crx3@1.1.3 \
            --keyPath "$RUNNER_TEMP/promptgnome.pem" \
            --crxPath "build/promptgnome-${VERSION}.crx" \
            build/chrome-mv3-prod

      - name: Shred signing key
        if: always()
        run: shred -u "$RUNNER_TEMP/promptgnome.pem" || rm -f "$RUNNER_TEMP/promptgnome.pem"

      - uses: softprops/action-gh-release@v2
        with:
          files: extension/build/*.crx
          generate_release_notes: true
