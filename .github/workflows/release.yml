name: Release

on:
  push:
    tags: ['v*']

jobs:
  guards:
    name: Free-build guards (Plan C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/free-build-guards.sh

  release:
    name: Production build + GitHub Release
    needs: guards
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm package
      - uses: softprops/action-gh-release@v2
        with:
          files: extension/build/*.zip
          generate_release_notes: true
