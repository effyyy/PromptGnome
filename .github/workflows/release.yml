name: Release

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

jobs:
  check-tag:
    name: Verify CI success on a v* tag
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - id: tag
        run: |
          TAG=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep -E '^v[0-9]' | head -n1 || true)
          if [ -z "$TAG" ]; then
            echo "No v* tag on this commit — skipping release."
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  release:
    name: Production build + signed CRX + GitHub Release
    needs: check-tag
    if: needs.check-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Write CRX signing key
        env:
          CRX_SIGNING_KEY: ${{ secrets.CRX_SIGNING_KEY }}
        run: |
          if [ -z "$CRX_SIGNING_KEY" ]; then
            echo "::error::CRX_SIGNING_KEY secret is not set"
            exit 1
          fi
          printf '%s' "$CRX_SIGNING_KEY" > "$RUNNER_TEMP/promptgnome.pem"

      - name: Pack signed CRX
        env:
          TAG: ${{ needs.check-tag.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          npx --yes crx3@1.1.3 \
            --keyPath "$RUNNER_TEMP/promptgnome.pem" \
            --crxPath "build/promptgnome-${VERSION}.crx" \
            build/chrome-mv3-prod

      - name: Shred signing key
        if: always()
        run: shred -u "$RUNNER_TEMP/promptgnome.pem" || rm -f "$RUNNER_TEMP/promptgnome.pem"

      - uses: softprops/action-gh-release@v2
        with:
          files: extension/build/*.crx
          generate_release_notes: true
