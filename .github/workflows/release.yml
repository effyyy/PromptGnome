name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Open or update Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build-and-publish:
    name: Build and publish to stores
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: extension/.nvmrc
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all targets
        run: |
          pnpm build
          pnpm build:firefox
          pnpm build:edge

      - name: Package zips
        run: |
          pnpm package
          pnpm package:firefox
          pnpm package:edge
          ls -la build/

      - name: Compute SHA256SUMS
        run: |
          cd build
          sha256sum *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" build/*.zip build/SHA256SUMS --clobber

      - name: Publish to Chrome / Firefox / Edge
        uses: PlasmoHQ/bpp@c15984c0a74f452851c605cab46f34d9fd6cb158
        with:
          keys: ${{ secrets.BPP_KEYS }}
          chrome-file: extension/build/chrome-mv3-prod.zip
          firefox-file: extension/build/firefox-mv3-prod.zip
          edge-file: extension/build/edge-mv3-prod.zip
          verbose: true
