name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release-please:
    name: Open or update Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build-and-publish:
    name: Build and publish to stores
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: extension/.nvmrc
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true

      - name: Build all targets
        run: |
          pnpm build
          pnpm build:firefox
          pnpm build:edge

      - name: Package zips
        run: |
          pnpm package
          pnpm package:firefox
          pnpm package:edge
          ls -la build/

      - name: Compute SHA256SUMS
        run: |
          cd build
          sha256sum *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" build/*.zip build/SHA256SUMS --clobber

      - name: Publish to Chrome / Firefox / Edge
        uses: PlasmoHQ/bpp@c15984c0a74f452851c605cab46f34d9fd6cb158
        with:
          keys: ${{ secrets.BPP_KEYS }}
          chrome-file: extension/build/chrome-mv3-prod.zip
          firefox-file: extension/build/firefox-mv3-prod.zip
          edge-file: extension/build/edge-mv3-prod.zip
          verbose: true
