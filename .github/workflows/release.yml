name: Release

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

jobs:
  check-tag:
    name: Verify CI success on a v* tag
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - id: tag
        run: |
          TAG=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep -E '^v[0-9]' | head -n1 || true)
          if [ -z "$TAG" ]; then
            echo "No v* tag on this commit — skipping release."
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  release:
    name: Production build + Chrome Web Store zip + GitHub Release
    needs: check-tag
    if: needs.check-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm package

      - name: Rename zip with version
        env:
          TAG: ${{ needs.check-tag.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          ZIP=$(ls build/*.zip | head -n1)
          mv "$ZIP" "build/promptgnome-${VERSION}.zip"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-tag.outputs.tag }}
          files: extension/build/*.zip
          generate_release_notes: true
