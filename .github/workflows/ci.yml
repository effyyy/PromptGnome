name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: extension/.nvmrc
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint || true   # remove `|| true` once lint script exists

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: extension/coverage/

      - name: Build (Chrome MV3)
        run: pnpm build

      - name: Build (Firefox MV3)
        run: pnpm build:firefox

      - name: Build (Edge MV3)
        run: pnpm build:edge

      - name: Verify free-build guards
        working-directory: ${{ github.workspace }}
        run: bash scripts/free-build-guards.sh

      - name: Verify no backend URLs in source
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-no-backend-urls.sh
