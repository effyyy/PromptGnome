name: CI

on:
  push:
    branches: [main, master, develop, oss-import]
  pull_request:

jobs:
  guards:
    name: Free-build guards (Plan C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run free-build guards
        run: bash scripts/free-build-guards.sh

  build:
    name: Typecheck + test + build
    needs: guards
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
