name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: extension/.nvmrc
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint || true   # remove `|| true` once lint script exists

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-report
          path: extension/coverage/

      - name: Build (Chrome MV3)
        run: pnpm build

      - name: Build (Firefox MV3)
        run: pnpm build:firefox

      - name: Build (Edge MV3)
        run: pnpm build:edge

      - name: Verify free-build guards
        working-directory: ${{ github.workspace }}
        run: bash scripts/free-build-guards.sh

      - name: Verify no backend URLs in source
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-no-backend-urls.sh
