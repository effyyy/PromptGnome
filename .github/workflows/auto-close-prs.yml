name: Auto-close pull requests

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Hi, and thanks for wanting to contribute.",
              "",
              "PromptGnome's source code lives in a private repository for now, so we are not able to accept pull requests against this repository. Please see [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for more context.",
              "",
              "If you spotted a typo or an error in the documentation, please open an issue and we will fix it quickly. We genuinely appreciate the catch.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
