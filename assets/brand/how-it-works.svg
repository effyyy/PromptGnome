<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#060a14"/>
      <stop offset="1" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5a0"/>
      <stop offset="1" stop-color="#00b37d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00e5a0"/>
    </marker>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)" stroke="rgba(0,229,160,.18)"/>

  <text x="40" y="58" font-family="'Bricolage Grotesque',sans-serif" font-size="32" font-weight="800" fill="#e8edf5">How PromptGnome works</text>
  <text x="40" y="88" font-family="'DM Sans',sans-serif" font-size="16" fill="#8a94a8">Every step happens inside your browser. Nothing is sent to a PromptGnome server.</text>

  <g font-family="'DM Sans',sans-serif">
    <!-- Step 1 -->
    <g transform="translate(40,130)">
      <rect width="220" height="180" rx="18" fill="#0e1628" stroke="rgba(0,229,160,.3)"/>
      <circle cx="36" cy="40" r="18" fill="rgba(0,229,160,.12)" stroke="#00e5a0"/>
      <text x="36" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#00e5a0">1</text>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#e8edf5">You type</text>
      <text x="20" y="84" font-size="14" fill="#8a94a8">Open ChatGPT, Claude,</text>
      <text x="20" y="104" font-size="14" fill="#8a94a8">or Gemini and write</text>
      <text x="20" y="124" font-size="14" fill="#8a94a8">your prompt as usual.</text>
      <rect x="20" y="140" width="180" height="26" rx="6" fill="#060a14" stroke="rgba(232,237,245,.1)"/>
      <text x="30" y="158" font-size="12" font-family="'JetBrains Mono',monospace" fill="#5a6478">My SSN is 123-45-...</text>
    </g>
    <line x1="265" y1="220" x2="305" y2="220" stroke="#00e5a0" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Step 2 -->
    <g transform="translate(310,130)">
      <rect width="220" height="180" rx="18" fill="#0e1628" stroke="rgba(0,229,160,.3)"/>
      <circle cx="36" cy="40" r="18" fill="rgba(0,229,160,.12)" stroke="#00e5a0"/>
      <text x="36" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#00e5a0">2</text>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#e8edf5">We intercept</text>
      <text x="20" y="84" font-size="14" fill="#8a94a8">PromptGnome catches</text>
      <text x="20" y="104" font-size="14" fill="#8a94a8">the outbound request</text>
      <text x="20" y="124" font-size="14" fill="#8a94a8">before it leaves.</text>
      <g transform="translate(20,142)">
        <rect width="180" height="24" rx="4" fill="#060a14" stroke="rgba(0,229,160,.3)"/>
        <text x="10" y="16" font-size="11" font-family="'JetBrains Mono',monospace" fill="#00e5a0">fetch() → paused</text>
      </g>
    </g>
    <line x1="535" y1="220" x2="575" y2="220" stroke="#00e5a0" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Step 3 -->
    <g transform="translate(580,130)">
      <rect width="220" height="180" rx="18" fill="#0e1628" stroke="rgba(255,179,71,.4)"/>
      <circle cx="36" cy="40" r="18" fill="rgba(255,179,71,.12)" stroke="#ffb347"/>
      <text x="36" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#ffb347">3</text>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#e8edf5">We detect</text>
      <text x="20" y="84" font-size="14" fill="#8a94a8">Local regex pipeline</text>
      <text x="20" y="104" font-size="14" fill="#8a94a8">scans for 18 PII</text>
      <text x="20" y="124" font-size="14" fill="#8a94a8">categories. No network.</text>
      <g transform="translate(20,142)">
        <rect width="60" height="22" rx="11" fill="rgba(255,179,71,.15)" stroke="#ffb347"/>
        <text x="30" y="15" text-anchor="middle" font-size="11" fill="#ffb347">SSN</text>
        <rect x="68" width="60" height="22" rx="11" fill="rgba(255,179,71,.15)" stroke="#ffb347"/>
        <text x="98" y="15" text-anchor="middle" font-size="11" fill="#ffb347">Email</text>
        <rect x="136" width="44" height="22" rx="11" fill="rgba(255,179,71,.15)" stroke="#ffb347"/>
        <text x="158" y="15" text-anchor="middle" font-size="11" fill="#ffb347">CC#</text>
      </g>
    </g>
    <line x1="805" y1="220" x2="845" y2="220" stroke="#00e5a0" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Step 4 -->
    <g transform="translate(850,130)">
      <rect width="220" height="180" rx="18" fill="#0e1628" stroke="rgba(0,229,160,.3)"/>
      <circle cx="36" cy="40" r="18" fill="rgba(0,229,160,.12)" stroke="#00e5a0"/>
      <text x="36" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#00e5a0">4</text>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#e8edf5">We warn</text>
      <text x="20" y="84" font-size="14" fill="#8a94a8">A warning overlay</text>
      <text x="20" y="104" font-size="14" fill="#8a94a8">shows what was found</text>
      <text x="20" y="124" font-size="14" fill="#8a94a8">and what to do next.</text>
      <g transform="translate(20,140)">
        <rect width="85" height="26" rx="6" fill="url(#emerald)"/>
        <text x="42" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="#060a14">Edit</text>
        <rect x="95" width="85" height="26" rx="6" fill="rgba(255,107,107,.12)" stroke="#ff6b6b"/>
        <text x="137" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="#ff6b6b">Send anyway</text>
      </g>
    </g>
    <line x1="1075" y1="220" x2="1115" y2="220" stroke="#00e5a0" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Step 5 -->
    <g transform="translate(1120,130)">
      <rect width="120" height="180" rx="18" fill="#0e1628" stroke="rgba(0,229,160,.3)"/>
      <circle cx="36" cy="40" r="18" fill="rgba(0,229,160,.12)" stroke="#00e5a0"/>
      <text x="36" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#00e5a0">5</text>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#e8edf5">You decide</text>
      <text x="20" y="90" font-size="13" fill="#8a94a8">Edit, allow,</text>
      <text x="20" y="108" font-size="13" fill="#8a94a8">or cancel.</text>
      <text x="20" y="148" font-size="11" fill="#5a6478">Always your call.</text>
    </g>
  </g>
</svg>
